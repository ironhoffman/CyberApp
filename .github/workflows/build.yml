name: Build Unsigned iOS IPA
on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: macos-latest # Берем виртуальный Макбук в облаке!
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7' # ЖЕСТКО УКАЗЫВАЕМ ВЕРСИЮ, КОТОРУЮ ТРЕБУЕТ FLET

      - name: Install Flet and tools
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Flet Prepare Project (Generate Flutter files)
        run: |
          # Flet соберет зависимости Python и развернет проект в build/flutter.
          # Команда выдаст ошибку Xcode в конце, поэтому добавляем '|| echo', 
          # чтобы GitHub Actions не падал — нам нужен только сгенерированный шаблон!
          flet build ipa --yes || echo "Flet подготовил проект (ошибку подписи Xcode игнорируем)"

      - name: Build Unsigned iOS App via Flutter
        run: |
          # Прыгаем внутрь сгенерированного Flet-ом Flutter-проекта
          cd build/flutter
          # Собираем чистое НЕПОДПИСАННОЕ приложение для реального iPhone (iphoneos)
          flutter build ios --no-codesign --release

      - name: Package to Unsigned IPA for AltStore
        run: |
          mkdir Payload
          # Копируем скомпилированное приложение .app из подпапки сборки напрямую в Payload
          cp -r build/flutter/build/ios/iphoneos/Runner.app Payload/
          # Архивируем папку Payload в формат .ipa, который понимает AltStore
          zip -r CyberApp.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberApp-Unsigned-IPA
          path: CyberApp.ipa
