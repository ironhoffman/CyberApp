name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Generate Flet Flutter project
        run: |
          flet build ipa --yes || true

      - name: Build iOS app without signing
        run: |
          cd build/flutter
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Debug build output
        run: |
          echo "Searching for .app files..."
          find build -name "*.app"

      - name: Package IPA
        run: |
          mkdir Payload
      
          APP_PATH=$(find build -name "*.app" | head -n 1)
      
          if [ -z "$APP_PATH" ]; then
            echo "No .app file found!"
            exit 1
          fi
      
          echo "Found app: $APP_PATH"
      
          cp -R "$APP_PATH" Payload/
      
          zip -r CyberApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CyberApp-Unsigned-IPA
          path: CyberApp.ipa
